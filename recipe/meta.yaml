{% set version = "2.9.0" %}

package:
  name: magma
  version: {{ version }}

source:
   url: https://github.com/icl-utk-edu/magma/archive/refs/tags/v{{ version }}.tar.gz
   sha256: c9307e3e10dd89cb0b8d00653e78291a868aef2c1a1c56956325600cc38f7284
   patches:
    - patches/thread_queue.patch
    - patches/cmake_policy.patch
    - patches/cuda13_clockrate.patch

build:
  number: 4
  skip: true  # [not (win or linux)]
  overlinking_ignore_patterns:
    - "lib/libgomp.so*"    # [blas_impl == "openblas"]
    - "lib/libmagma*.so*"  # [blas_impl == "openblas"]
requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('cuda') }}                                 # [cuda_compiler_version != "None"]
    - cmake
    - ninja-base
    # Git tag archives omit pre-generated precision sources; upstream uses Makefile "generate"
    - make    # [unix]
    - msys2-make  # [win]
    - perl
    - python
  host:
    - cuda-version {{ cuda_compiler_version }}               # [cuda_compiler_version != "None"]

    - cuda-cudart-dev                                        # [cuda_compiler_version != "None"]
    - cuda-profiler-api                                      # [cuda_compiler_version != "None"]
    - libcublas-dev                                          # [cuda_compiler_version != "None"]
    - libcusparse-dev                                        # [cuda_compiler_version != "None"]

    - intel-openmp {{ mkl }}  # [blas_impl == "mkl"]
    - mkl {{ mkl }}  # [blas_impl == "mkl"]
    - mkl-include  # [blas_impl == "mkl"]
    - mkl-devel {{ mkl }}  # [blas_impl == "mkl" and win]
    - libopenblas  # [blas_impl == "openblas"]
    - openblas-devel  # [blas_impl == "openblas" and win]

  run:
    - intel-openmp {{ mkl }}  # [blas_impl == "mkl"]
    - mkl {{ mkl }}  # [blas_impl == "mkl"]
    - libopenblas  # [blas_impl == "openblas"]
    - libgomp      # [blas_impl == "openblas" and linux]

test:
  commands:
    - test -f $PREFIX/include/magma.h                             # [unix]
    - test -f $PREFIX/lib/libmagma${SHLIB_EXT}                    # [unix]
    - test -f $PREFIX/lib/libmagma_sparse${SHLIB_EXT}             # [unix]
    - if not exist %LIBRARY_PREFIX%\include\magma.h exit 1        # [win]
    - if not exist %LIBRARY_PREFIX%\lib\magma.lib exit 1          # [win]
    - if not exist %LIBRARY_PREFIX%\bin\magma.dll exit 1          # [win]
    - if not exist %LIBRARY_PREFIX%\lib\magma_sparse.lib exit 1   # [win]
    - if not exist %LIBRARY_PREFIX%\bin\magma_sparse.dll exit 1   # [win]

about:
  home: https://icl.utk.edu/magma
  license: BSD-3-Clause
  license_family: BSD
  license_file: COPYRIGHT
  summary: Matrix Algebra on GPU and Multicore Architectures
  description: |
    A new generation of linear algebra libraries that achieves the fastest possible time to an accurate solution on
    heterogeneous architectures, starting with current multicore + multi-GPU systems.
  doc_url: https://icl.utk.edu/projectsfiles/magma/doxygen/
  dev_url: https://github.com/icl-utk-edu/magma

extra:
  skip-lints:
    - host_section_needs_exact_pinnings
